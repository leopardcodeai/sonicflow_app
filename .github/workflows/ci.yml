name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  core-js:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sonicflow_app/core-js
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm test
