name: CI

on:
  push:
    branches:
      - main
      - "sf/**"
  pull_request:

jobs:
  core-js:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sonicflow_app/core-js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test

  core-swift:
    runs-on: macos-14
    defaults:
      run:
        working-directory: sonicflow_app/core-swift
    steps:
      - uses: actions/checkout@v4
      - run: swift test

  warning-audit:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
      - run: ./scripts/check_warnings.sh
