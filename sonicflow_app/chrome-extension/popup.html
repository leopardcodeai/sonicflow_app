<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SonicFlow</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f0f0f;
        --fg: #f5f7fb;
        --muted: #8e97a8;
        --border: #1f2735;
        --panel: rgba(10, 14, 20, 0.8);
      }

      body {
        margin: 0;
        width: 320px;
        min-height: 420px;
        padding: 20px;
        background: radial-gradient(circle at top, #1b2433 0%, var(--bg) 55%);
        color: var(--fg);
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .shell {
        display: grid;
        gap: 14px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .status {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        color: var(--muted);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #556070;
      }

      .dot.active {
        background: #3ccf91;
      }

      .panel {
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--panel);
      }

      strong {
        display: block;
        margin-bottom: 6px;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .mode-card {
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.02);
        padding: 12px;
        text-align: left;
        color: inherit;
      }

      .mode-card.active {
        border-color: var(--mode-color);
        box-shadow: inset 0 0 0 1px var(--mode-color);
      }

      .mode-card small {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
      }

      .slider-row {
        display: grid;
        gap: 8px;
      }

      .slider-meta {
        display: flex;
        justify-content: space-between;
        color: var(--muted);
      }

      input[type="range"] {
        width: 100%;
      }

      .toggle {
        border: 0;
        border-radius: 16px;
        padding: 14px 16px;
        font: inherit;
        font-weight: 600;
        color: #f7fbff;
        background: linear-gradient(135deg, #378add, #235dd3);
      }

      .toggle.stop {
        background: linear-gradient(135deg, #1d9e75, #12795a);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="header">
        <strong>SonicFlow</strong>
        <div class="status">
          <span class="dot" id="status-dot"></span>
          <span id="status-text">Off</span>
        </div>
      </div>
      <div class="panel">
        <div class="grid" id="mode-grid"></div>
      </div>
      <div class="panel slider-row">
        <div class="slider-meta">
          <strong>Beat volume</strong>
          <span id="volume-value">15</span>
        </div>
        <input id="volume-slider" type="range" min="0" max="100" value="15">
      </div>
      <div class="panel">
        <p id="page-message">Checking current tab for YouTube or SoundCloud media...</p>
      </div>
      <button class="toggle" id="toggle-button" type="button">Start SonicFlow</button>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
