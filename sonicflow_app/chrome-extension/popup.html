<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SonicFlow</title>
    <link rel="stylesheet" href="brand.css">
    <style>
      html, body {
        background: var(--neutral-ink);
      }

      body {
        position: relative;
        margin: 0;
        width: 320px;
        min-height: 420px;
        padding: var(--space-lg);
        color: var(--neutral-fg);
        font: 14px/1.4 var(--font-body);
        isolation: isolate;
      }

      /* Leopard pattern — procedural, sits behind the blurred panels.
         Base = leopard-base, spots = leopard-spot with leopard-ring outline.
         No motion; never sits directly under body copy. */
      .leopard-bg {
        position: fixed;
        inset: 0;
        z-index: -1;
        background-image:
          linear-gradient(180deg, rgba(9, 9, 11, 0.42), rgba(9, 9, 11, 0.78)),
          url("./assets/leopard_wallpaper.png"),
          radial-gradient(circle at 12% 18%, var(--leopard-spot) 0 6px, var(--leopard-ring) 7px 10px, transparent 11px),
          radial-gradient(circle at 78% 10%, var(--leopard-spot) 0 8px, var(--leopard-ring) 9px 13px, transparent 14px),
          radial-gradient(circle at 42% 34%, var(--leopard-spot) 0 5px, var(--leopard-ring) 6px 9px, transparent 10px),
          radial-gradient(circle at 88% 42%, var(--leopard-spot) 0 9px, var(--leopard-ring) 10px 14px, transparent 15px),
          radial-gradient(circle at 22% 58%, var(--leopard-spot) 0 7px, var(--leopard-ring) 8px 12px, transparent 13px),
          radial-gradient(circle at 62% 66%, var(--leopard-spot) 0 10px, var(--leopard-ring) 11px 15px, transparent 16px),
          radial-gradient(circle at 8%  82%, var(--leopard-spot) 0 6px, var(--leopard-ring) 7px 10px, transparent 11px),
          radial-gradient(circle at 48% 88%, var(--leopard-spot) 0 8px, var(--leopard-ring) 9px 13px, transparent 14px),
          radial-gradient(circle at 92% 78%, var(--leopard-spot) 0 7px, var(--leopard-ring) 8px 11px, transparent 12px),
          radial-gradient(circle at 32% 14%, var(--leopard-spot) 0 5px, var(--leopard-ring) 6px 9px, transparent 10px),
          radial-gradient(circle at 70% 50%, var(--leopard-spot) 0 6px, var(--leopard-ring) 7px 10px, transparent 11px),
          radial-gradient(circle at 16% 38%, var(--leopard-spot) 0 7px, var(--leopard-ring) 8px 12px, transparent 13px);
        background-size: cover, cover, 180px 180px, 220px 220px, 160px 160px, 200px 200px,
                         190px 190px, 230px 230px, 170px 170px, 210px 210px,
                         175px 175px, 205px 205px, 195px 195px, 185px 185px;
        background-position: center, center, 0 0, 40px 10px, 80px 40px, 20px 80px,
                             60px 100px, 100px 60px, 10px 130px, 70px 140px,
                             120px 20px, 150px 90px, 40px 160px, 130px 150px;
        opacity: var(--leopard-opacity);
        filter: blur(var(--leopard-blur));
        pointer-events: none;
      }

      .shell {
        position: relative;
        display: grid;
        gap: var(--space-md);
        z-index: 1;
      }

      .hero {
        display: grid;
        grid-template-columns: 72px minmax(0, 1fr);
        gap: var(--space-sm);
        align-items: center;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header strong {
        font-family: var(--font-display);
        letter-spacing: -0.01em;
        color: var(--accent-gold);
      }

      .status {
        display: inline-flex;
        gap: var(--space-sm);
        align-items: center;
        color: var(--neutral-muted);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: var(--radius-pill);
        background: var(--neutral-muted);
      }

      .dot.active {
        background: var(--accent-success);
        box-shadow: 0 0 8px var(--accent-success);
      }

      .panel {
        padding: var(--space-md);
        border: 1px solid var(--neutral-border);
        border-radius: var(--radius-md);
        background: var(--neutral-panel);
        backdrop-filter: blur(14px) saturate(120%);
        -webkit-backdrop-filter: blur(14px) saturate(120%);
        box-shadow: var(--elev-soft);
      }

      strong {
        display: block;
        margin-bottom: var(--space-xs);
      }

      p {
        margin: 0;
        color: var(--neutral-muted);
      }

      .eyebrow {
        color: var(--accent-gold);
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hero-copy {
        font-size: 13px;
        line-height: 1.5;
      }

      .hero-art {
        width: 72px;
        height: 72px;
        object-fit: cover;
        border-radius: 22px;
        border: 1px solid var(--neutral-border);
        box-shadow: var(--elev-gold);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .mode-card {
        border: 1px solid var(--neutral-border);
        border-radius: var(--radius-md);
        background: rgba(255, 255, 255, 0.02);
        padding: 12px;
        text-align: left;
        color: inherit;
        font: inherit;
        cursor: pointer;
        transition: box-shadow 160ms ease, border-color 160ms ease, transform 160ms ease;
      }

      .mode-card:hover {
        border-color: var(--mode-color, var(--neutral-border));
      }

      /* Active mode card glow per BRAND.md:
         0 0 24px modeColor + 0 0 64px (modeColor at 30% alpha) */
      .mode-card.active {
        border-color: var(--mode-color);
        box-shadow:
          inset 0 0 0 1px var(--mode-color),
          0 0 24px var(--mode-color),
          0 0 64px color-mix(in oklab, var(--mode-color), transparent 70%);
      }

      .mode-card small {
        display: block;
        margin-bottom: var(--space-xs);
        color: var(--neutral-muted);
        font-family: var(--font-mono);
      }

      .slider-row {
        display: grid;
        gap: var(--space-sm);
      }

      .stack {
        display: grid;
        gap: var(--space-md);
      }

      .slider-meta {
        display: flex;
        justify-content: space-between;
        color: var(--neutral-muted);
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent-gold);
      }

      .toggle {
        border: 0;
        border-radius: var(--radius-md);
        padding: var(--space-md) var(--space-lg);
        font: inherit;
        font-weight: 600;
        color: var(--neutral-fg);
        background: linear-gradient(135deg, var(--mode-focus), var(--chakra-crown));
        cursor: pointer;
        box-shadow: var(--elev-gold);
        transition: box-shadow 160ms ease, opacity 160ms ease;
      }

      .toggle:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .toggle.stop {
        background: linear-gradient(135deg, var(--accent-danger), var(--chakra-root));
      }
    </style>
  </head>
  <body>
    <div class="leopard-bg" aria-hidden="true"></div>
    <div class="shell">
      <div class="header">
        <strong>SonicFlow</strong>
        <div class="status">
          <span class="dot" id="status-dot"></span>
          <span id="status-text">Off</span>
        </div>
      </div>
      <div class="panel hero">
        <img class="hero-art" id="hero-art" src="./assets/bowl_hero.png" alt="Golden singing bowl with flowing rainbow energy">
        <div>
          <span class="eyebrow">FlowTones Runtime</span>
          <strong id="hero-title">Focus Primer</strong>
          <p class="hero-copy" id="hero-description">Preset-first sessions with ambient texture, pulse shaping, and browser-safe layering.</p>
        </div>
      </div>
      <div class="panel">
        <strong>Starter Sessions</strong>
        <div class="grid" id="example-grid"></div>
      </div>
      <div class="panel">
        <div class="grid" id="mode-grid"></div>
      </div>
      <div class="panel stack">
        <div class="slider-row">
          <div class="slider-meta">
            <strong>Beat volume</strong>
            <span id="volume-value">15</span>
          </div>
          <input id="volume-slider" type="range" min="0" max="100" value="15">
        </div>
        <div class="slider-row">
          <div class="slider-meta">
            <strong>Duration</strong>
            <span id="duration-value">25 min</span>
          </div>
          <input id="duration-slider" type="range" min="5" max="60" step="5" value="25">
        </div>
        <div class="slider-row">
          <div class="slider-meta">
            <strong>Ambient mix</strong>
            <span id="ambient-value">45%</span>
          </div>
          <input id="ambient-slider" type="range" min="20" max="100" step="1" value="45">
        </div>
        <div class="slider-row">
          <div class="slider-meta">
            <strong>Pulse depth</strong>
            <span id="pulse-value">95%</span>
          </div>
          <input id="pulse-slider" type="range" min="20" max="100" step="1" value="95">
        </div>
      </div>
      <div class="panel">
        <p id="page-message">Checking current tab for YouTube or SoundCloud media...</p>
      </div>
      <button class="toggle" id="toggle-button" type="button">Start SonicFlow</button>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
