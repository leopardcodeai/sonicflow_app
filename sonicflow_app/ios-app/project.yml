name: SonicFlow
options:
  deploymentTarget:
    iOS: "16.0"
packages:
  SonicFlowCore:
    path: ../core-swift
targets:
  SonicFlow:
    type: application
    platform: iOS
    sources:
      - SonicFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sonicflow.ios
        PRODUCT_NAME: SonicFlow
        INFOPLIST_FILE: SonicFlow/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: SonicFlow/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
        NSDocumentsFolderUsageDescription: SonicFlow uses selected audio files for playback.
    dependencies:
      - package: SonicFlowCore
  SonicFlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SonicFlowTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sonicflow.ios.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: SonicFlow
