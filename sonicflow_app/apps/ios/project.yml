name: SonicFlow
options:
  deploymentTarget:
    iOS: "16.0"
packages:
  SonicFlowCore:
    path: ../../shared/core-swift
schemes:
  SonicFlow:
    shared: true
    build:
      targets:
        SonicFlow: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SonicFlowTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
targets:
  SonicFlow:
    type: application
    platform: iOS
    sources:
      - SonicFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sonicflow.ios
        PRODUCT_NAME: SonicFlow
        INFOPLIST_FILE: SonicFlow/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: SonicFlow/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
        NSDocumentsFolderUsageDescription: SonicFlow uses selected audio files for playback.
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
    dependencies:
      - package: SonicFlowCore
      - target: SonicFlowLiveActivityExtension
        embed: true
  SonicFlowLiveActivityExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.2"
    sources:
      - SonicFlowLiveActivityExtension
      - path: SonicFlow/Core/Models/SonicFlowLiveActivity.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sonicflow.ios.liveactivity
        PRODUCT_NAME: SonicFlowLiveActivityExtension
        INFOPLIST_FILE: SonicFlowLiveActivityExtension/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
  SonicFlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SonicFlowTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sonicflow.ios.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: SonicFlow
      - package: SonicFlowCore

  SonicFlowUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SonicFlowUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sonicflow.ios.uitests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: SonicFlow
      - package: SonicFlowCore
